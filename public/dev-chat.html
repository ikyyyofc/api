<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot - Plugin Generator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body code:not(.hljs) { background-color: #e2e8f0; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; color: #ef4444;}
        pre::-webkit-scrollbar { height: 8px; }
        pre::-webkit-scrollbar-track { background: #282c34; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        pre::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-robot text-2xl text-blue-400"></i>
            <div>
                <h1 class="text-xl font-bold">DevBot AI</h1>
                <p class="text-xs text-slate-400">Asisten Pembuat Plugin API</p>
            </div>
        </div>
        <a href="/docs" target="_blank" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-semibold transition">Lihat API Docs</a>
    </header>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-box">
        <div class="flex items-start gap-3 w-full md:w-3/4">
            <div class="bg-slate-800 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
                <p class="text-gray-800">Halo! Saya DevBot, AI yang telah diintegrasikan dengan kode proyek ini. <br><br>Saya sudah membaca struktur plugin Anda. Ingin membuat plugin apa hari ini?</p>
            </div>
        </div>
    </main>

    <footer class="bg-white p-4 border-t border-gray-300">
        <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2">
            <textarea id="message-input" rows="1" placeholder="Ketik perintah AI disini..." class="w-full bg-gray-100 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-32 overflow-y-auto" required></textarea>
            <button type="submit" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl h-[48px] w-[48px] flex items-center justify-center shrink-0 transition">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <script>
        const renderer = {
            code(code, info) {
                const language = info || 'plaintext';
                const validLanguage = hljs.getLanguage(language) ? language : 'plaintext';
                const highlighted = hljs.highlight(code, { language: validLanguage }).value;
                const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                return `
                    <div class="relative group mt-4 mb-4 rounded-lg overflow-hidden bg-[#282c34] border border-gray-700 shadow-sm">
                        <div class="flex justify-between items-center px-4 py-2 bg-[#21252b] text-xs text-gray-400 border-b border-gray-700">
                            <span class="uppercase font-bold tracking-wider">${validLanguage}</span>
                            <button class="flex items-center gap-1.5 hover:text-white transition-colors" onclick="copyCode(this)" title="Salin Kode">
                                <i class="fa-regular fa-copy"></i> <span class="copy-text">Salin</span>
                            </button>
                        </div>
                        <pre class="p-4 overflow-x-auto text-[13px] leading-relaxed"><code class="hljs ${validLanguage}">${highlighted}</code></pre>
                        <textarea class="hidden-code" style="display:none;">${escapedCode}</textarea>
                    </div>
                `;
            }
        };
        marked.use({ renderer });

        window.copyCode = function(btn) {
            const container = btn.closest('.relative');
            const textArea = container.querySelector('.hidden-code');
            const tempTextArea = document.createElement('textarea');
            const txt = document.createElement("textarea");
            txt.innerHTML = textArea.innerHTML;
            tempTextArea.value = txt.value;
            
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                const textSpan = btn.querySelector('.copy-text');
                const icon = btn.querySelector('i');
                const originalText = textSpan.innerText;
                const originalIcon = icon.className;
                
                textSpan.innerText = 'Tersalin!';
                icon.className = 'fa-solid fa-check text-green-400';
                
                setTimeout(() => {
                    textSpan.innerText = originalText;
                    icon.className = originalIcon;
                }, 2000);
            } catch (err) {
                alert('Gagal menyalin kode.');
            } finally {
                document.body.removeChild(tempTextArea);
            }
        };

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        let conversationHistory = [];

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function addMessage(role, content) {
            const isUser = role === 'user';
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-3 w-full md:w-5/6 ${isUser ? 'ml-auto flex-row-reverse' : ''}`;
            
            const iconHTML = isUser 
                ? `<div class="bg-blue-600 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-white"></i></div>`
                : `<div class="bg-slate-800 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0"><i class="fa-solid fa-robot text-white"></i></div>`;

            const displayContent = isUser ? content.replace(/\n/g, '<br>') : marked.parse(content);

            messageDiv.innerHTML = `
                ${iconHTML}
                <div class="${isUser ? 'bg-blue-100 text-blue-900' : 'bg-white text-gray-800'} p-4 rounded-lg shadow border border-gray-200 markdown-body overflow-hidden w-full">
                    ${displayContent}
                </div>
            `;
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'flex items-center gap-2 text-gray-500 text-sm ml-12 mb-4';
            loadingDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-blue-500"></i> DevBot sedang memikirkan kode (Bisa memakan waktu 10-30 detik)...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideLoading() {
            const loadingDiv = document.getElementById('loading-indicator');
            if (loadingDiv) loadingDiv.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            showLoading();

            try {
                const response = await fetch('/api/dev/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                // PERBAIKAN: Baca sebagai teks dulu agar tidak crash jika balasan bukan JSON
                const responseText = await response.text();
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error("Respons mentah dari server:", responseText);
                    throw new Error("Server mengirim balasan yang rusak atau koneksi terputus. (Cek log di console browser)");
                }

                hideLoading();

                if (response.ok && data.reply) {
                    addMessage('assistant', data.reply);
                    conversationHistory.push({ role: 'assistant', content: data.reply });
                } else {
                    addMessage('assistant', `*Error dari Server: ${data.error || 'Terjadi kesalahan internal'}*`);
                }
            } catch (error) {
                hideLoading();
                // PERBAIKAN: Tampilkan error apa adanya ke layar untuk mempermudah perbaikan
                addMessage('assistant', `*Error Sistem: ${error.message}*`);
                console.error("Detail Error:", error);
            } finally {
                sendBtn.disabled = false;
            }
        });

        // PERBAIKAN: Mencegah error refresh page di mobile saat menekan ENTER
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click(); // Lebih stabil daripada dispatchEvent
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot - Plugin Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .markdown-body pre { background-color: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem;}
        .markdown-body code { font-family: monospace; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-robot text-2xl text-blue-400"></i>
            <div>
                <h1 class="text-xl font-bold">DevBot AI</h1>
                <p class="text-xs text-slate-400">Asisten Pembuat Plugin API</p>
            </div>
        </div>
        <a href="/docs" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-semibold transition">Lihat API Docs</a>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-box">
        <!-- Initial Message -->
        <div class="flex items-start gap-3 w-full md:w-3/4">
            <div class="bg-slate-800 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div class="bg-white p-4 rounded-lg shadow border border-gray-200">
                <p class="text-gray-800">Halo! Saya DevBot, AI yang telah diintegrasikan dengan *codebase* proyek ini. <br><br>Saya sudah membaca struktur <code>server.js</code> dan format plugin Anda. Ingin membuat plugin apa hari ini?</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 border-t border-gray-300">
        <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2">
            <textarea id="message-input" rows="1" placeholder="Misal: Buatkan saya plugin untuk download video TikTok..." class="w-full bg-gray-100 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-32 overflow-y-auto" required></textarea>
            <button type="submit" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl h-[48px] w-[48px] flex items-center justify-center shrink-0 transition">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        let conversationHistory = [];

        // Auto resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function addMessage(role, content) {
            const isUser = role === 'user';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-3 w-full md:w-5/6 ${isUser ? 'ml-auto flex-row-reverse' : ''}`;
            
            const iconHTML = isUser 
                ? `<div class="bg-blue-600 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-white"></i></div>`
                : `<div class="bg-slate-800 rounded-full p-2 h-10 w-10 flex items-center justify-center shrink-0"><i class="fa-solid fa-robot text-white"></i></div>`;

            // Parse Markdown untuk AI
            const displayContent = isUser ? content.replace(/\n/g, '<br>') : marked.parse(content);

            messageDiv.innerHTML = `
                ${iconHTML}
                <div class="${isUser ? 'bg-blue-100 text-blue-900' : 'bg-white text-gray-800'} p-4 rounded-lg shadow border border-gray-200 markdown-body overflow-hidden">
                    ${displayContent}
                </div>
            `;
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'flex items-center gap-2 text-gray-500 text-sm ml-12 mb-4';
            loadingDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> DevBot sedang memikirkan kode...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideLoading() {
            const loadingDiv = document.getElementById('loading-indicator');
            if (loadingDiv) loadingDiv.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            // Reset UI
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Tambah ke UI & History
            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            showLoading();

            try {
                const response = await fetch('/api/dev/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                hideLoading();

                if (data.reply) {
                    addMessage('assistant', data.reply);
                    conversationHistory.push({ role: 'assistant', content: data.reply });
                } else {
                    addMessage('assistant', `*Error: ${data.error || 'Terjadi kesalahan internal'}*`);
                }
            } catch (error) {
                hideLoading();
                addMessage('assistant', `*Error: Gagal terhubung ke server.*`);
            } finally {
                sendBtn.disabled = false;
            }
        });

        // Submit dengan Enter (kecuali Shift+Enter)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
